{% extends "base.html" %}
{% block content %}

<div style="display:flex; justify-content:center; align-items:center; margin-bottom:1.25rem; gap:0.75rem;">
    <input id="recipe-search" class="recipe-search-input" type="text" placeholder="Search recipes...">
    <a href="/recipe/new" class="btn-primary" style="white-space:nowrap;">+ Add Recipe</a>
</div>

{% for cat in category_order %}
  {% if grouped[cat] %}
  <section class="category-section" id="cat-{{ loop.index }}">
      <div class="category-header">
          <span class="category-name">{{ cat }}</span>
          <span class="category-count">{{ grouped[cat]|length }}</span>
      </div>
      <ul class="recipe-list">
          {% for recipe in grouped[cat] %}
          <li class="recipe-item">
              <a href="/recipe/{{ recipe.id }}" class="recipe-link">
                  {{ recipe.name }}
              </a>
          </li>
          {% endfor %}
      </ul>
  </section>
  {% endif %}
{% endfor %}

{% endblock %}
